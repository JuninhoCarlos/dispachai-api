openapi: 3.0.3
info:
  title: Despacha ai API
  version: 1.0.0
  description: Your project description
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      security:
      - knoxApiToken: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      security:
      - knoxApiToken: []
      responses:
        '200':
          description: No response body
  /api/auth/logoutall/:
    post:
      operationId: auth_logoutall_create
      description: |-
        Log the user out of all sessions
        I.E. deletes all auth tokens for the user
      tags:
      - auth
      security:
      - knoxApiToken: []
      responses:
        '200':
          description: No response body
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - knoxApiToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/despacho/advogado:
    get:
      operationId: despacho_advogado_list
      tags:
      - despacho
      security:
      - knoxApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Advogado'
          description: ''
    post:
      operationId: despacho_advogado_create
      tags:
      - despacho
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Advogado'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Advogado'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Advogado'
        required: true
      security:
      - knoxApiToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Advogado'
          description: ''
  /api/pagamento:
    get:
      operationId: pagamento_list
      tags:
      - pagamento
      security:
      - knoxApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Processo'
          description: ''
  /api/pagamento/contrato:
    post:
      operationId: pagamento_contrato_create
      tags:
      - pagamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PagamentoContrato'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PagamentoContrato'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PagamentoContrato'
        required: true
      security:
      - knoxApiToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagamentoContrato'
          description: ''
  /api/pagamento/implantacao:
    post:
      operationId: pagamento_implantacao_create
      tags:
      - pagamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PagamentoImplantacao'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PagamentoImplantacao'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PagamentoImplantacao'
        required: true
      security:
      - knoxApiToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagamentoImplantacao'
          description: ''
  /api/pagamento/processo:
    post:
      operationId: pagamento_processo_create
      tags:
      - pagamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Processo'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Processo'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Processo'
      security:
      - knoxApiToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Processo'
          description: ''
components:
  schemas:
    Advogado:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 100
        oab_numero:
          type: string
          nullable: true
          maxLength: 20
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        telefone:
          type: string
          nullable: true
          maxLength: 15
        comissao_padrao:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
      required:
      - id
      - nome
    PagamentoContrato:
      type: object
      properties:
        processo:
          type: integer
        valor_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        entrada:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        valor_parcela:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        numero_parcelas:
          type: integer
          maximum: 2147483647
          minimum: 0
        vencimento_entrada:
          type: string
          format: date
        tipo:
          type: string
          readOnly: true
      required:
      - entrada
      - numero_parcelas
      - processo
      - tipo
      - valor_parcela
      - valor_total
      - vencimento_entrada
    PagamentoImplantacao:
      type: object
      properties:
        tipo:
          type: string
          readOnly: true
        processo:
          type: integer
        valor_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        porcentagem_escritorio:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        data_vencimento:
          type: string
          format: date
      required:
      - data_vencimento
      - porcentagem_escritorio
      - processo
      - tipo
      - valor_total
    Processo:
      type: object
      properties:
        id_processo:
          type: integer
          readOnly: true
        cliente:
          type: string
          nullable: true
        advogado:
          type: string
          readOnly: true
        corretor:
          type: string
          readOnly: true
        pagamentos:
          type: string
          readOnly: true
      required:
      - advogado
      - corretor
      - id_processo
      - pagamentos
    User:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
        is_staff:
          type: boolean
          writeOnly: true
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          writeOnly: true
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
      required:
      - password
      - username
  securitySchemes:
    knoxApiToken:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
