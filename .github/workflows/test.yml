name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/appdb
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run tests with coverage
        run: |
          set -o pipefail
          uv run coverage run manage.py test 2>&1 | tee /tmp/test_output.txt
          TEST_COUNT=$(grep -o 'Ran [0-9]* test' /tmp/test_output.txt | awk '{print $2}' || echo "unknown")
          echo "TEST_COUNT=${TEST_COUNT}" >> $GITHUB_ENV

      - name: Coverage report
        run: uv run coverage report

      - name: Capture coverage percentage
        run: |
          COVERAGE_PCT=$(uv run coverage report | grep TOTAL | awk '{print $NF}')
          echo "COVERAGE_PCT=${COVERAGE_PCT:-unknown}" >> $GITHUB_ENV

      - name: Write job summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests run | ${{ env.TEST_COUNT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ env.COVERAGE_PCT }} |" >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage XML
        run: uv run coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
